# Local development infrastructure only — Postgres+PostGIS, Redis, Meilisearch, MinIO
# (S3-compatible stand-in for Cloudflare R2/AWS S3). Application services (api/worker/
# realtime/web-*) run natively via `pnpm dev` for fast iteration, not in containers here.
# See docs/02-architecture/ARCHITECTURE.md §21 and docs/06-folder-structure/FOLDER_STRUCTURE.md.

name: hyperlocal-marketplace

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace_dev_only
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev_only_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - ./.docker-data/meilisearch:/meili_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: marketplace
      MINIO_ROOT_PASSWORD: marketplace_dev_only
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - ./.docker-data/minio:/data
